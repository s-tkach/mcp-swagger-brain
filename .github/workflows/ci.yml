name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:SkipEmbeddingModelDownload=true

      - name: Test
        run: dotnet test --configuration Release --no-build /p:SkipEmbeddingModelDownload=true

      - name: Vulnerability scan
        run: dotnet list package --vulnerable --include-transitive
